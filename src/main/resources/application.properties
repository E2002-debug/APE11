# ============================================
# Configuración del Nodo - Algoritmo Bully
# ============================================
# IMPORTANTE: Cada computadora debe cambiar:
#   1. node.id (1, 2, 3, 4 o 5)
#   2. Las IPs en node.peers
# ============================================

# ID único de este nodo (cambiar en cada PC: 1-5)
node.id=1

# Puerto del servidor (mismo en todas las PCs)
server.port=8080

# Lista de todos los nodos: id,ip,puerto separados por punto y coma
# CAMBIAR las IPs según tu red local (usar: hostname -I)
node.peers=1,192.168.1.101,8080;2,192.168.1.102,8080;3,192.168.1.103,8080;4,192.168.1.104,8080;5,192.168.1.105,8080

# ============================================
# Configuración del Algoritmo Bully
# ============================================

# Timeout para mensajes de elección (ms) - ajustado para red cableada
bully.election-timeout=2000

# Intervalo de heartbeat al coordinador (ms)
bully.heartbeat-interval=5000

# ============================================
# Configuración de Spring Boot
# ============================================
spring.application.name=bully-algorithm
